# bootc-image-builder configuration for vSphere VMDK output

# Force xfs instead of Fedora's default btrfs (vSphere compatibility)
[[customizations.filesystem]]
mountpoint = "/"
minsize = "10 GiB"
type = "xfs"

[[customizations.user]]
name = "cloud-user"
groups = ["wheel"]
key = "ssh-rsa  rgolan@fedora"
